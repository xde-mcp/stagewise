name: _Release Browser (Reusable)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version to release (e.g., 1.0.0-alpha.11)"
      tag:
        required: true
        type: string
        description: "Git tag to create (e.g., stagewise@1.0.0-alpha.11)"
      channel:
        required: true
        type: string
        description: "Release channel (alpha, beta, release)"
    secrets:
      NUCLEO_LICENSE_KEY:
        required: false
      POSTHOG_API_KEY:
        required: false
      SUPABASE_URL:
        required: false
      SUPABASE_PUBLISHABLE_KEY:
        required: false
      VITE_POSTHOG_API_KEY:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
      MACOS_CERT_P12_BASE64:
        required: false
      MACOS_CERT_P12_PASSWORD:
        required: false
      # PostHog CLI secrets (source map upload)
      POSTHOG_CLI_API_KEY:
        required: false
      POSTHOG_CLI_PROJECT_ID:
        required: false
      # Azure Trusted Signing secrets (Windows code signing)
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_ACCOUNT_NAME:
        required: false
      AZURE_ACCOUNT_ENDPOINT_URI:
        required: false
      AZURE_CERTIFICATE_PROFILE_NAME:
        required: false

jobs:
  # Create the git tag from the current commit
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag (idempotent)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            EXISTING=$(git rev-list -n 1 "refs/tags/${{ inputs.tag }}")
            CURRENT=$(git rev-parse HEAD)
            if [ "$EXISTING" = "$CURRENT" ]; then
              echo "Tag ${{ inputs.tag }} already exists on current commit — skipping"
              exit 0
            else
              echo "::error::Tag ${{ inputs.tag }} exists but points to a different commit ($EXISTING vs $CURRENT)"
              exit 1
            fi
          fi

          git tag "${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Read release notes
        id: notes
        run: |
          PACKAGE_DIR="apps/browser"
          VERSION="${{ inputs.version }}"

          NOTES=""
          if [ -f "$PACKAGE_DIR/CHANGELOG.md" ]; then
            NOTES=$(sed -n "/## ${VERSION}/,/## [0-9]/p" "$PACKAGE_DIR/CHANGELOG.md" | head -n -1)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

    outputs:
      notes: ${{ steps.notes.outputs.notes }}

  build:
    needs: tag
    environment: Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            arch: arm64
            artifact: stagewise-macos-arm64
          - os: ubuntu-latest
            arch: x64
            artifact: stagewise-linux-x64
          - os: windows-latest
            arch: x64
            artifact: stagewise-windows-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      NUCLEO_LICENSE_KEY: ${{ secrets.NUCLEO_LICENSE_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
      API_URL: ${{ vars.API_URL }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      STAGEWISE_CONSOLE_URL: ${{ vars.STAGEWISE_CONSOLE_URL }}
      VITE_STAGEWISE_CONSOLE_URL: ${{ vars.VITE_STAGEWISE_CONSOLE_URL }}
      LLM_PROXY_URL: ${{ vars.LLM_PROXY_URL }}
      VITE_DISABLE_TELEMETRY: ${{ vars.VITE_DISABLE_TELEMETRY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      UPDATE_SERVER_ORIGIN: ${{ vars.UPDATE_SERVER_ORIGIN }}
      # PostHog CLI (source map upload during packaging)
      POSTHOG_CLI_API_KEY: ${{ secrets.POSTHOG_CLI_API_KEY }}
      POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_CLI_PROJECT_ID }}
      POSTHOG_CLI_HOST: ${{ vars.POSTHOG_CLI_HOST }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Import macOS signing certs
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Setup Windows code signing (Azure Trusted Signing)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install Azure.CodeSigning.Dlib via NuGet
          $nugetDir = "${{ runner.temp }}\nuget"
          New-Item -ItemType Directory -Force -Path $nugetDir | Out-Null
          nuget install Microsoft.Trusted.Signing.Client -Version 1.0.95 -OutputDirectory $nugetDir -Source https://api.nuget.org/v3/index.json

          # Find the installed dlib
          $dlibPath = Get-ChildItem -Path $nugetDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dlibPath) {
            Write-Error "Failed to find Azure.CodeSigning.Dlib.dll"
            exit 1
          }

          # Find signtool.exe from Windows SDK
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\bin"
          $signtoolPath = Get-ChildItem -Path $sdkPath -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object { [version]($_.Directory.Parent.Name -replace '^(\d+\.\d+\.\d+\.\d+).*', '$1') } -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtoolPath) {
            Write-Error "Failed to find signtool.exe in Windows SDK"
            exit 1
          }

          # Create metadata.json for Azure Trusted Signing
          $metadataPath = "${{ runner.temp }}\metadata.json"
          $metadataContent = @"
          {
            "Endpoint": "${{ secrets.AZURE_ACCOUNT_ENDPOINT_URI }}",
            "CodeSigningAccountName": "${{ secrets.AZURE_ACCOUNT_NAME }}",
            "CertificateProfileName": "${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}"
          }
          "@
          [System.IO.File]::WriteAllText($metadataPath, $metadataContent.Trim(), [System.Text.UTF8Encoding]::new($false))

          # Export environment variables for subsequent steps
          echo "SIGNTOOL_PATH=$signtoolPath" >> $env:GITHUB_ENV
          echo "AZURE_CODE_SIGNING_DLIB=$dlibPath" >> $env:GITHUB_ENV
          echo "AZURE_METADATA_JSON=$metadataPath" >> $env:GITHUB_ENV

          Write-Host "Azure Trusted Signing configured"

      - run: pnpm build

      - name: Build Electron App
        working-directory: apps/browser
        run: pnpm make --arch=${{ matrix.arch }}
        env:
          BUILD_MODE: production
          # macOS signing
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Windows signing (Azure Trusted Signing)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Release channel
          RELEASE_CHANNEL: ${{ inputs.channel == 'release' && 'release' || 'prerelease' }}

      - name: List build output
        working-directory: apps/browser
        run: find out -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.nupkg" -o -name "RELEASES*" -o -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) 2>/dev/null || true
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/browser/out/*/make/
          if-no-files-found: warn

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect Artifacts
        run: |
          mkdir -p release

          echo "Found artifacts:"
          find artifacts -type f

          # Copy all release files to flat directory
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.nupkg" -o -name "RELEASES*" -o -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) -exec cp {} release/ \;

          echo "Release artifacts:"
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Stagewise ${{ inputs.version }}"
          body: ${{ needs.tag.outputs.notes }}
          prerelease: ${{ inputs.channel != 'release' }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
